apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-idp
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-idp
  template:
    metadata:
      labels:
        app: k8s-idp
    spec:
      serviceAccountName: k8s-idp
      containers:
        - name: k8s-idp
          image: k8s-idp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: MODE
              value: kubernetes
            - name: PORT
              value: "8080"
          readinessProbe:
            httpGet:
              path: /api/services
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-idp
  namespace: default
spec:
  selector:
    app: k8s-idp
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
